services:
  postgres:
    image: postgres:16-alpine
    container_name: nexoagent_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexoagent
      POSTGRES_PASSWORD: nexoagent_password
      POSTGRES_DB: nexoagent_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
